name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Substitute webhook URLs
        run: |
          sed -i \
            -e 's|https://YOUR_N8N_INSTANCE/alexa-plus-trigger|${{ vars.N8N_WEBHOOK_URL }}|g' \
            -e 's|https://YOUR_N8N_INSTANCE/echo-show-view-assist|${{ vars.N8N_VIEW_WEBHOOK_URL }}|g' \
            index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
